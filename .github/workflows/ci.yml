name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'task/**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} / Laravel 13

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, pdo, tokenizer, xml, ctype, json, intl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pint (style check)
        run: composer format:test

      - name: Run PHPStan
        run: composer analyse

      - name: Run PHPUnit suites
        run: composer test
